<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Liquid Glass Effect Gacor</title>

    <style>
        /* Background keren buat ngetes efek kacanya */
        body
         {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #ff0057, #e64a19, #2196f3); /* Warna gradasi vibrant */
            font-family: 'Segoe UI', sans-serif;
        }

        /* INI DIA RESEP LIQUID GLASS-NYA */
        .glass-card {
            width: 350px;
            padding: 40px;
            color: white;
            text-align: center;
            
            /* 1. Warna transparan */
            background: rgba(255, 255, 255, 0.1); 
            
            /* 2. Efek blur (The Real Glass Effect) */
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); /* Support Safari */
            
            /* 3. Border halus */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            
            /* 4. Shadow biar estetik */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);

            transition: 0.5s; /* Biar animasinya halus */
    cursor: pointer;
        }
        .glass-card:hover {
    transform: translateY(-10px); /* Kartu naik dikit */
    background: rgba(255, 255, 255, 0.2); /* Lebih terang pas di-hover */
    box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5); /* Shadow makin dalem */
}
.glass-nav {
    position: fixed;
    top: 20px;
    width: 80%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    z-index: 1000;
}

.glass-nav .logo { color: white; font-weight: bold; font-size: 1.5rem; }
.glass-nav ul { display: flex; list-style: none; gap: 20px; }
.glass-nav ul li a { color: white; text-decoration: none; font-size: 0.9rem; }
.glass-input {
    width: 100%;
    padding: 12px;
    margin: 20px 0;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    color: white;
    outline: none;
}

.glass-btn {
    width: 100%;
    padding: 12px;
    background: #00d2ff; /* Warna solid buat kontras */
    background: linear-gradient(to right, #3a7bd5, #00d2ff);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
    transition: 0.3s;
}

.glass-btn:hover {
    filter: brightness(1.2);
    transform: scale(1.02);
}

        h2 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { font-weight: 300; line-height: 1.6; }
    </style>
</head>
<body><nav class="glass-nav">
    <div class="logo">GacorDev</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Project</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav></body>
<body>
    
    <div class="glass-card">
    <h2>Gacor Abis!</h2>
    <p>Sekarang lengkap dengan input & button.</p>
    
    <input type="text" class="glass-input" placeholder="Tulis sesuatu...">
    <button class="glass-btn">Gaspol!</button>
</div>

</body>
</html>
